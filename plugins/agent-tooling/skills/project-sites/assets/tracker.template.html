<!DOCTYPE html>
<html lang="en" data-theme="%%THEME%%"><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<!-- Self-contained status/progress tracker generated by the `project-sites` skill (tracker type).
     All content is embedded as JSON below and rendered client-side with safe DOM APIs
     (textContent / createElement — never innerHTML on user data), so it is XSS-safe by
     construction. CSS is inlined (offline / CSP-safe); the only external resource is the
     optional Google Fonts link (omitted when embedded / --project-css-only). -->
%%CSP%%
<title>%%TITLE%%</title>
<!-- restore/resolve theme before paint (no flash); honors project theme when the toggle is off -->
<script id="tk-boot" type="application/json">%%CONFIG%%</script>
<script>(function(){try{var c=JSON.parse(document.getElementById('tk-boot').textContent||'{}');
  var mq=window.matchMedia&&matchMedia('(prefers-color-scheme: dark)').matches;var t;
  if(c.themeToggle){t=localStorage.getItem(c.lsKey||'tk-theme')||c.theme||(mq?'dark':'light');}
  else{t=(c.theme==='auto')?(mq?'dark':'light'):(c.theme||'light');}
  document.documentElement.setAttribute('data-theme',(t==='dark')?'dark':'light');}catch(e){}})();</script>
%%FONTS%%
%%STYLEHEAD%%
</head>
<body class="tk bg-app text-app font-sans antialiased">

<nav class="tk-nav">
  <div class="tk-navin">
    <div class="tk-brand">
      <span class="tk-logo" aria-hidden="true">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M12 2v20M2 12h20" stroke="#fff" stroke-width="2.6" stroke-linecap="round"></path></svg>
      </span>
      <span id="tk-brandtext">Tracker</span>
    </div>
    <div class="tk-navlinks">
      <a href="#milestones">Progress</a>
      <a href="#calendar">Calendar</a>
      <a href="#resources">Resources</a>
      <a href="#timeline">Timeline</a>
      <a href="#archive">Archive</a>
    </div>
    <button class="tk-themebtn" id="tk-theme" title="Toggle light / dark" aria-label="Toggle theme" hidden>◐</button>
  </div>
</nav>

<header class="tk-wrap tk-hero" id="top">
  <div class="tk-eyebrow" id="tk-eyebrow" hidden><span class="tk-dot"></span><span id="tk-eyebrow-text"></span></div>
  <h1 class="tk-h1" id="tk-title"></h1>
  <p class="tk-sub" id="tk-subtitle"></p>
  <div class="tk-stats" id="tk-stats"></div>
</header>

<section class="tk-wrap tk-section" id="milestones" hidden>
  <div class="tk-sectag">Progress</div>
  <h2 class="tk-h2">Milestones</h2>
  <p class="tk-sub" id="tk-ms-sub"></p>
  <div class="tk-ms" id="tk-ms"></div>
  <!-- [ERP-3] Optional figure slot rendered right under the milestone bars from
       DATA.figure { src, alt?, caption?, figma? } (e.g. an embedded program-map PNG).
       Auto-hidden when absent; populated client-side (safe img src, no innerHTML). -->
  <figure class="tk-figure" id="tk-figure" hidden></figure>
</section>

<section class="tk-wrap tk-section" id="calendar" hidden>
  <div class="tk-sectag">Daily log</div>
  <h2 class="tk-h2">Calendar</h2>
  <p class="tk-sub" id="tk-cal-sub"></p>
  <div class="tk-cal-legend">
    <span><i style="background:var(--lp-accent)"></i> Today</span>
    <span><i style="background:var(--lp-ok-bg);box-shadow:inset 0 0 0 1px var(--lp-ok)"></i> Update logged</span>
    <span><i style="background:var(--lp-panel2)"></i> Project day</span>
  </div>
  <div class="tk-cal-grid" id="tk-cal-grid"></div>
</section>

<section class="tk-wrap tk-section" id="resources" hidden>
  <div class="tk-sectag">Shared materials</div>
  <h2 class="tk-h2">Resources</h2>
  <p class="tk-sub" id="tk-res-sub"></p>
  <div class="tk-rescols" id="tk-rescols"></div>
</section>

<section class="tk-wrap tk-section" id="timeline" hidden>
  <div class="tk-sectag">Daily log</div>
  <h2 class="tk-h2">Timeline</h2>
  <p class="tk-sub" id="tk-tl-sub"></p>
  <div class="tk-timeline" id="tk-timeline"></div>
</section>

<section class="tk-wrap tk-section" id="archive" hidden>
  <div class="tk-sectag">Journal</div>
  <h2 class="tk-h2">Archive</h2>
  <p class="tk-sub" id="tk-arc-sub"></p>
  <div class="tk-archive" id="tk-archive"></div>
</section>

<footer class="tk-foot">
  <div class="tk-footin">
    <span id="tk-foot-left"></span>
    <span id="tk-foot-right"></span>
  </div>
</footer>

<div class="tk-modal-bg" id="tk-modal-bg">
  <div class="tk-modal" role="dialog" aria-modal="true" aria-labelledby="tk-modal-date">
    <div class="tk-modal-top">
      <button class="tk-modal-x" id="tk-modal-x" aria-label="Close">×</button>
      <div class="tk-modal-date" id="tk-modal-date"></div>
      <div class="tk-modal-dow" id="tk-modal-dow"></div>
    </div>
    <div class="tk-modal-body" id="tk-modal-body"></div>
  </div>
</div>

<script id="tk-data" type="application/json">%%DATA%%</script>
<script>
(function(){
  'use strict';
  var DATA, CFG;
  try { DATA = JSON.parse(document.getElementById('tk-data').textContent); }
  catch(e){ DATA = {}; }
  try { CFG = JSON.parse(document.getElementById('tk-boot').textContent); }
  catch(e){ CFG = {}; }

  // ── tiny safe DOM helpers ──────────────────────────────────────────────────
  function el(tag, cls, text){
    var n = document.createElement(tag);
    if (cls) n.className = cls;
    if (text != null) n.textContent = String(text); // textContent = auto-escaped
    return n;
  }
  function show(id){ var n = document.getElementById(id); if(n) n.hidden = false; }
  // Only allow safe link schemes; anything else (javascript:, data:) is dropped.
  function safeHref(u){
    if (typeof u !== 'string') return null;
    var s = u.trim();
    if (/^(https?:|mailto:|#|\/|\.\.?\/)/i.test(s)) return s;
    return null;
  }
  // Image sources additionally allow `data:image/…` (embedded base64 figures). Kept
  // SEPARATE from safeHref so links can never smuggle a data: URL. CSP already pins
  // img-src to 'self' data:.
  function safeImgSrc(u){
    if (typeof u !== 'string') return null;
    var s = u.trim();
    if (/^data:image\//i.test(s)) return s;
    if (/^(https?:|\/|\.\.?\/)/i.test(s)) return s;
    return null;
  }

  var ICON = { file:'⬇', website:'↗', video:'▶', link:'↗', doc:'⬇' };
  var DOW = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  var MON = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  function fmtDate(iso){
    // Parse YYYY-MM-DD without timezone drift; fall back to the raw string.
    var m = /^(\d{4})-(\d{2})-(\d{2})/.exec(String(iso||''));
    if (!m) return { date:String(iso||''), dow:'' };
    var d = new Date(Number(m[1]), Number(m[2])-1, Number(m[3]));
    return { date: Number(m[3]) + ' ' + MON[d.getMonth()] + ' ' + m[1], dow: DOW[d.getDay()], ymd: m[1]+'-'+m[2]+'-'+m[3] };
  }

  // ── header ─────────────────────────────────────────────────────────────────
  document.title = DATA.title || 'Tracker';
  document.getElementById('tk-brandtext').textContent = DATA.brand || DATA.title || 'Tracker';
  document.getElementById('tk-title').textContent = DATA.title || 'Status Tracker';
  document.getElementById('tk-subtitle').textContent = DATA.subtitle || '';
  if (DATA.kicker){
    document.getElementById('tk-eyebrow-text').textContent = DATA.kicker;
    show('tk-eyebrow');
  }

  // stat tiles
  (DATA.stats || []).forEach(function(s){
    var tile = el('div','tk-stat');
    tile.appendChild(el('b', null, s.value != null ? s.value : ''));
    tile.appendChild(el('span', null, s.label || ''));
    document.getElementById('tk-stats').appendChild(tile);
  });

  // ── milestones ───────────────────────────────────────────────────────────────
  var ms = DATA.milestones || [];
  if (ms.length){
    document.getElementById('tk-ms-sub').textContent = DATA.milestones_note || '';
    var msRoot = document.getElementById('tk-ms');
    ms.forEach(function(m){
      var pct = Math.max(0, Math.min(100, Number(m.pct) || 0));
      var card = el('div','tk-mscard');
      var top = el('div','tk-mstop');
      top.appendChild(el('span','tk-mslabel', m.label || ''));
      top.appendChild(el('span','tk-mspct', pct + '%'));
      card.appendChild(top);
      var track = el('div','tk-track');
      var fill = el('i','tk-fill'); fill.style.display='block'; fill.style.width = pct + '%';
      track.appendChild(fill); card.appendChild(track);
      if (m.note) card.appendChild(el('div','tk-msnote', m.note));
      msRoot.appendChild(card);
    });
    show('milestones');
  }

  // ── optional figure under the milestones (e.g. an embedded program-map PNG) ──
  var fig = DATA.figure;
  if (fig && typeof fig === 'object'){
    var fsrc = safeImgSrc(fig.src);
    if (fsrc){
      var figBox = document.getElementById('tk-figure');
      // `width` (px) caps the figure to ~half the image's intrinsic width for crisp 2×
      // rendering; the .tk-figure img rule keeps max-width:100% for responsiveness.
      if (typeof fig.width === 'number' && fig.width > 0) figBox.style.maxWidth = fig.width + 'px';
      var fimg = el('img'); fimg.src = fsrc; fimg.alt = String(fig.alt == null ? '' : fig.alt);
      fimg.decoding = 'async';
      figBox.appendChild(fimg);
      if (fig.caption || fig.figma){
        var cap = el('figcaption','tk-figcap');
        if (fig.caption) cap.appendChild(document.createTextNode(String(fig.caption) + (fig.figma ? '  ' : '')));
        var fh = safeHref(fig.figma);
        if (fh){ var a = el('a','tk-figma-link','drawn in FigJam →'); a.href = fh; a.target='_blank'; a.rel='noopener noreferrer'; cap.appendChild(a); }
        figBox.appendChild(cap);
      }
      figBox.hidden = false;
      // Ensure the milestones section is visible even if there are no milestone bars.
      show('milestones');
    }
  }

  // ── resource item / chip renderers ─────────────────────────────────────────
  function renderChip(t){
    var text, kind;
    if (t && typeof t === 'object'){ text = t.text != null ? t.text : ''; kind = t.kind || ''; }
    else { text = t; kind = ''; }
    var known = {file:1,website:1,video:1,new:1,lock:1,size:1,filename:1};
    var c = 'tk-chip' + (known[kind] ? ' ' + kind : '');
    return el('span', c, text);
  }
  function renderItem(item){
    var kind = item.kind || 'file';
    var href = safeHref(item.url);
    var node = href ? el('a','tk-item') : el('div','tk-item');
    if (href){
      node.href = href;
      if (kind === 'file') { if (item.file) node.setAttribute('download', item.file); }
      else { node.target = '_blank'; node.rel = 'noopener noreferrer'; }
    }
    var top = el('div','tk-item-top');
    top.appendChild(el('span','tk-item-ic', ICON[kind] || ICON.file));
    top.appendChild(el('span', null, item.title || ''));
    node.appendChild(top);
    if (item.desc) node.appendChild(el('div','tk-item-desc', item.desc));
    if (item.tags && item.tags.length){
      var tags = el('div','tk-item-tags');
      item.tags.forEach(function(t){ tags.appendChild(renderChip(t)); });
      node.appendChild(tags);
    }
    if (item.credentials){
      var cr = item.credentials;
      var wrap = el('div','tk-cred');
      var table = el('table');
      if (cr.headers && cr.headers.length){
        var thead = el('thead'), htr = el('tr');
        cr.headers.forEach(function(h){ htr.appendChild(el('th', null, h)); });
        thead.appendChild(htr); table.appendChild(thead);
      }
      var tbody = el('tbody');
      (cr.rows || []).forEach(function(row){
        var tr = el('tr');
        (row || []).forEach(function(cell){ tr.appendChild(el('td', null, cell)); });
        tbody.appendChild(tr);
      });
      table.appendChild(tbody); wrap.appendChild(table); node.appendChild(wrap);
      if (cr.note) node.appendChild(el('div','tk-note', cr.note));
    }
    if (item.note && !item.credentials) node.appendChild(el('div','tk-note', item.note));
    return node;
  }
  function renderColumn(col, dir){
    var root = el('div','tk-rescol' + (dir === 'in' ? ' in' : ' out'));
    var top = el('div','tk-rescol-top');
    top.appendChild(el('span','tk-arrow', dir === 'in' ? '←' : '→'));
    var htxt = el('div');
    htxt.appendChild(el('h3', null, col.heading || (dir==='in' ? 'Shared with us' : 'Shared by us')));
    if (col.subheading) htxt.appendChild(el('div','tk-ct', col.subheading));
    top.appendChild(htxt); root.appendChild(top);
    (col.groups || []).forEach(function(g){
      var grp = el('div','tk-grp');
      grp.appendChild(el('div','tk-grp-h', g.heading || ''));
      (g.items || []).forEach(function(it){ grp.appendChild(renderItem(it)); });
      root.appendChild(grp);
    });
    return root;
  }

  var res = DATA.resources || {};
  if (res.out || res.in){
    document.getElementById('tk-res-sub').textContent = DATA.resources_note || '';
    var cols = document.getElementById('tk-rescols');
    if (res.out) cols.appendChild(renderColumn(res.out, 'out'));
    if (res.in)  cols.appendChild(renderColumn(res.in, 'in'));
    show('resources');
  }

  // ── timeline ─────────────────────────────────────────────────────────────────
  var days = (DATA.days || []).slice();
  if (days.length){
    document.getElementById('tk-tl-sub').textContent = DATA.timeline_note || '';
    // newest first
    days.sort(function(a,b){ return String(b.date||'').localeCompare(String(a.date||'')); });
    var today = DATA.today || null;
    var tl = document.getElementById('tk-timeline');
    days.forEach(function(day){
      var f = fmtDate(day.date);
      var isToday = today ? (f.ymd === today) : false;
      var d = el('div','tk-day' + (isToday ? ' today' : ''));
      var head = el('div','tk-day-head');
      head.appendChild(el('span','tk-day-date', f.date));
      if (f.dow) head.appendChild(el('span','tk-day-dow', f.dow));
      if (day.badge || isToday) head.appendChild(el('span','tk-day-badge', day.badge || 'Today'));
      d.appendChild(head);
      var card = el('div','tk-daycard');
      if (day.title) card.appendChild(el('div','tk-mslabel', day.title));
      var bullets = day.bullets || [];
      if (bullets.length){
        bullets.forEach(function(b){
          var row = el('div','tk-bullet');
          row.appendChild(el('span','tk-b-ic','•'));
          row.appendChild(el('span', null, b));
          card.appendChild(row);
        });
      } else {
        card.appendChild(el('div','tk-empty','No entries logged for this day.'));
      }
      if (day.note) card.appendChild(el('div','tk-daynote', day.note));
      d.appendChild(card);
      tl.appendChild(d);
    });
    show('timeline');
  }

  // ── archive / journal (ingest-logs) — expandable, dated, per-file original content ──
  var archive = DATA.archive || DATA.journal || null;
  if (archive && Array.isArray(archive.files) && archive.files.length){
    document.getElementById('tk-arc-sub').textContent = archive.note || DATA.archive_note || '';
    var arcRoot = document.getElementById('tk-archive');
    archive.files.forEach(function(file, fi){
      var fileBox = el('div','tk-arc-file' + (fi === 0 ? '' : ' collapsed'));
      var fh = el('button','tk-arc-file-h'); fh.type = 'button';
      fh.appendChild(el('span','tk-arc-caret','▾'));
      fh.appendChild(el('span','tk-arc-fname', file.file || file.name || 'file'));
      var entries = (file.entries || []).slice();
      // newest-first by date string
      entries.sort(function(a,b){ return String(b.date||'').localeCompare(String(a.date||'')); });
      fh.appendChild(el('span','tk-arc-count', entries.length + (entries.length === 1 ? ' entry' : ' entries')));
      (function(box){ fh.addEventListener('click', function(){ box.classList.toggle('collapsed'); }); })(fileBox);
      fileBox.appendChild(fh);
      var entRoot = el('div','tk-arc-entries');
      entries.forEach(function(entry, ei){
        var entBox = el('div','tk-arc-entry' + (fi === 0 && ei === 0 ? '' : ' collapsed'));
        var eh = el('button','tk-arc-entry-h'); eh.type = 'button';
        var f = fmtDate(entry.date);
        eh.appendChild(el('span','tk-arc-date', f.ymd ? f.date : (entry.date || '')));
        if (entry.heading) eh.appendChild(el('span','tk-arc-heading', entry.heading));
        eh.appendChild(el('span','tk-arc-caret','▾'));
        (function(box){ eh.addEventListener('click', function(){ box.classList.toggle('collapsed'); }); })(entBox);
        entBox.appendChild(eh);
        var body = el('div','tk-arc-body');
        body.appendChild(el('pre', null, entry.content != null ? entry.content : ''));
        if (entry.hash) body.appendChild(el('div','tk-arc-hash', 'sha256 ' + String(entry.hash).slice(0,12)));
        entBox.appendChild(body);
        entRoot.appendChild(entBox);
      });
      fileBox.appendChild(entRoot);
      arcRoot.appendChild(fileBox);
    });
    show('archive');
  }

  // ── day-detail modal (opened from calendar cells) ─────────────────────────────
  var modalBg = document.getElementById('tk-modal-bg');
  function openModal(day){
    var f = fmtDate(day.date);
    document.getElementById('tk-modal-date').textContent = f.date;
    document.getElementById('tk-modal-dow').textContent = f.dow + (day.badge ? '  ·  ' + day.badge : '');
    var body = document.getElementById('tk-modal-body');
    body.textContent = '';
    if (day.title) body.appendChild(el('div','tk-mslabel', day.title));
    var bullets = day.bullets || [];
    if (bullets.length){
      bullets.forEach(function(b){
        var row = el('div','tk-bullet');
        row.appendChild(el('span','tk-b-ic','•'));
        row.appendChild(el('span', null, b));
        body.appendChild(row);
      });
    } else {
      body.appendChild(el('div','tk-empty','No entries logged for this day.'));
    }
    if (day.note) body.appendChild(el('div','tk-daynote', day.note));
    modalBg.classList.add('open');
  }
  function closeModal(){ modalBg.classList.remove('open'); }
  document.getElementById('tk-modal-x').addEventListener('click', closeModal);
  modalBg.addEventListener('click', function(e){ if (e.target === modalBg) closeModal(); });
  document.addEventListener('keydown', function(e){ if (e.key === 'Escape') closeModal(); });

  // ── calendar month-grid ──────────────────────────────────────────────────────
  var allDays = DATA.days || [];
  if (allDays.length){
    var byDate = {};
    allDays.forEach(function(d){ var f = fmtDate(d.date); if (f.ymd) byDate[f.ymd] = d; });
    var dates = allDays.map(function(d){ return fmtDate(d.date).ymd; }).filter(Boolean).sort();
    var cal = DATA.calendar || {};
    var startY = String(cal.start || dates[0] || '');
    var endY = String(cal.end || dates[dates.length - 1] || '');
    var sm = /^(\d{4})-(\d{2})-(\d{2})$/.exec(startY), em = /^(\d{4})-(\d{2})-(\d{2})$/.exec(endY);
    if (sm && em){
      document.getElementById('tk-cal-sub').textContent = DATA.calendar_note || DATA.timeline_note || '';
      var pad = function(n){ return String(n).padStart(2,'0'); };
      var start = new Date(+sm[1], +sm[2]-1, +sm[3]);
      var end = new Date(+em[1], +em[2]-1, +em[3]);
      var grid = document.getElementById('tk-cal-grid');
      var today = DATA.today || null;
      var cur = new Date(start.getFullYear(), start.getMonth(), 1);
      var guard = 0;
      while (cur <= end && guard++ < 60){
        var y = cur.getFullYear(), mo = cur.getMonth();
        var month = el('div','tk-month');
        month.appendChild(el('h4', null, MON[mo] + ' ' + y));
        // count logged days in this month
        var cnt = dates.filter(function(d){ return d.slice(0,7) === y + '-' + pad(mo+1); }).length;
        month.appendChild(el('div','tk-mo-sub', cnt + (cnt === 1 ? ' update logged' : ' updates logged')));
        var dow = el('div','tk-dow');
        ['S','M','T','W','T','F','S'].forEach(function(x){ dow.appendChild(el('span', null, x)); });
        month.appendChild(dow);
        var days = el('div','tk-days');
        var first = new Date(y, mo, 1).getDay();
        for (var i=0;i<first;i++) days.appendChild(el('div','tk-cell empty'));
        var last = new Date(y, mo+1, 0).getDate();
        for (var dnum=1; dnum<=last; dnum++){
          var ymd = y + '-' + pad(mo+1) + '-' + pad(dnum);
          var thisDate = new Date(y, mo, dnum);
          var inrange = thisDate >= start && thisDate <= end;
          var cell = el('div','tk-cell' + (inrange ? ' inrange' : ''), dnum);
          if (byDate[ymd]) cell.classList.add('logged');
          if (today && ymd === today) { cell.classList.remove('logged'); cell.classList.add('today'); }
          if (byDate[ymd]){
            (function(day){ cell.addEventListener('click', function(){ openModal(day); }); })(byDate[ymd]);
            cell.setAttribute('tabindex','0'); cell.setAttribute('role','button');
          }
          days.appendChild(cell);
        }
        month.appendChild(days);
        grid.appendChild(month);
        cur.setMonth(cur.getMonth() + 1);
      }
      show('calendar');
    }
  }

  // ── footer ─────────────────────────────────────────────────────────────────
  document.getElementById('tk-foot-left').textContent = DATA.footer_left || DATA.title || '';
  document.getElementById('tk-foot-right').textContent = DATA.footer_right || '';

  // ── theme toggle (only when standalone; hidden when honoring a project theme) ──
  if (CFG.themeToggle){
    var tbtn = document.getElementById('tk-theme'); tbtn.hidden = false;
    tbtn.addEventListener('click', function(){
      var cur = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
      var next = cur === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      try { localStorage.setItem(CFG.lsKey || 'tk-theme', next); } catch(e){}
    });
  }
})();
</script>
</body></html>
