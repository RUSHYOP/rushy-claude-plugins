<!DOCTYPE html>
<html lang="en" data-theme="%%THEME%%"><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<!-- Self-contained documentation site generated by the `docs-page` skill.
     All content is embedded as JSON below and rendered client-side with safe DOM APIs
     (textContent / createElement — never innerHTML on user data), so it is XSS-safe by
     construction. Mermaid diagram sources are set via textContent and rendered with
     securityLevel:'strict'. Everything (CSS + optional mermaid lib) is inlined for
     offline / CSP use; the only external references are the (optional) Google Fonts
     link and any project stylesheet the author explicitly linked. -->
%%CSP%%
<title>%%TITLE%%</title>
<!-- restore theme before paint (no flash). When the theme toggle is disabled (e.g. an
     embedded route honoring the host app's theme) this leaves the server-set attribute. -->
<script id="dp-boot" type="application/json">%%CONFIG%%</script>
<script>(function(){try{var c=JSON.parse(document.getElementById('dp-boot').textContent||'{}');
  var mq=window.matchMedia&&matchMedia('(prefers-color-scheme: dark)').matches;var t;
  if(c.themeToggle){t=localStorage.getItem(c.lsKey||'dp-theme')||c.theme||(mq?'dark':'light');}
  else{t=(c.theme==='auto')?(mq?'dark':'light'):(c.theme||'light');}
  document.documentElement.setAttribute('data-theme',(t==='dark')?'dark':'light');}catch(e){}})();</script>
%%FONTS%%
%%STYLEHEAD%%
</head>
<body class="dp bg-app text-app font-sans antialiased">

<div class="dp-top">
  <div class="dp-topin">
    <button class="dp-menubtn" id="dp-menu" aria-label="Toggle navigation">&#9776;</button>
    <a class="dp-brand" href="#top" id="dp-brand">
      <span class="dp-logo" aria-hidden="true">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M6 3h9l5 5v13H6z" stroke="#fff" stroke-width="2" stroke-linejoin="round"></path><path d="M14 3v6h6" stroke="#fff" stroke-width="2" stroke-linejoin="round"></path></svg>
      </span>
      <span id="dp-brandtext">Docs</span>
      <span class="dp-ver" id="dp-ver" hidden></span>
    </a>
    <div class="dp-top-spacer"></div>
    <div class="dp-search" id="dp-searchwrap" hidden>
      <span class="dp-search-ic" aria-hidden="true">&#9906;</span>
      <input id="dp-search" type="search" placeholder="Search docs…" aria-label="Search documentation" autocomplete="off"/>
    </div>
    <button class="dp-themebtn" id="dp-theme" title="Toggle light / dark" aria-label="Toggle theme" hidden>&#9680;</button>
  </div>
</div>

<div class="dp-side-backdrop" id="dp-backdrop"></div>

<div class="dp-shell">
  <aside class="dp-side" id="dp-side" aria-label="Section navigation"></aside>
  <main class="dp-main">
    <header class="dp-hero" id="top">
      <div class="dp-eyebrow" id="dp-eyebrow" hidden><span class="dp-dot"></span><span id="dp-eyebrow-text"></span></div>
      <h1 class="dp-h1" id="dp-title"></h1>
      <p class="dp-lede" id="dp-lede"></p>
    </header>
    <div id="dp-sections"></div>
    <div class="dp-nomatch" id="dp-nomatch">No sections match your search.</div>
    <footer class="dp-foot">
      <span id="dp-foot-left"></span>
      <span id="dp-foot-right"></span>
    </footer>
  </main>
</div>

<script id="dp-data" type="application/json">%%DATA%%</script>
<script>
(function(){
  'use strict';
  var DATA, CFG;
  try { DATA = JSON.parse(document.getElementById('dp-data').textContent); } catch(e){ DATA = {}; }
  try { CFG = JSON.parse(document.getElementById('dp-boot').textContent); } catch(e){ CFG = {}; }

  // ── tiny safe DOM helpers (textContent = auto-escaped; no innerHTML on user data) ──
  function el(tag, cls, text){
    var n = document.createElement(tag);
    if (cls) n.className = cls;
    if (text != null) n.textContent = String(text);
    return n;
  }
  // Only allow safe link schemes; anything else (javascript:, data:) is dropped.
  function safeHref(u){
    if (typeof u !== 'string') return null;
    var s = u.trim();
    if (/^(https?:|mailto:|#|\/|\.\.?\/)/i.test(s)) return s;
    return null;
  }
  // Image sources additionally allow `data:image/…` (used for embedded, self-contained
  // base64 figures). The document CSP already restricts img-src to 'self' data:. This is
  // deliberately SEPARATE from safeHref so links can never smuggle a data: URL.
  function safeImgSrc(u){
    if (typeof u !== 'string') return null;
    var s = u.trim();
    if (/^data:image\//i.test(s)) return s;
    if (/^(https?:|\/|\.\.?\/)/i.test(s)) return s;
    return null;
  }
  // A tiny, safe inline formatter: split escaped text on `code` spans and [text](url)
  // links, building real DOM nodes (never innerHTML). **bold**/*em* also supported.
  function inlineInto(parent, text){
    var s = String(text == null ? '' : text);
    // tokenizer: code | link | bold | em | plain
    var re = /(`[^`]+`)|(\[[^\]]+\]\([^)\s]+\))|(\*\*[^*]+\*\*)|(\*[^*]+\*)/g;
    var last = 0, m;
    while ((m = re.exec(s))){
      if (m.index > last) parent.appendChild(document.createTextNode(s.slice(last, m.index)));
      var tok = m[0];
      if (m[1]) { parent.appendChild(el('code', null, tok.slice(1, -1))); }
      else if (m[2]) {
        var mm = /^\[([^\]]+)\]\(([^)\s]+)\)$/.exec(tok);
        var href = safeHref(mm[2]);
        if (href){ var a = el('a', null, mm[1]); a.href = href;
          if (!/^(#|\/|\.\.?\/)/.test(href)){ a.target='_blank'; a.rel='noopener noreferrer'; }
          parent.appendChild(a);
        } else parent.appendChild(document.createTextNode(mm[1]));
      }
      else if (m[3]) { parent.appendChild(el('strong', null, tok.slice(2, -2))); }
      else if (m[4]) { parent.appendChild(el('em', null, tok.slice(1, -1))); }
      last = re.lastIndex;
    }
    if (last < s.length) parent.appendChild(document.createTextNode(s.slice(last)));
    return parent;
  }
  function slug(s){ return String(s||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'') || 'sec'; }

  // ── block renderers ──────────────────────────────────────────────────────────
  var CALLOUT_IC = { note:'ℹ', tip:'✔', warn:'⚠' };
  function renderBlock(b){
    if (!b || typeof b !== 'object') return null;
    switch (b.type){
      case 'prose': {
        var p = el('p', 'dp-p' + (b.variant === 'lede' ? ' lede' : b.variant === 'note' ? ' note' : ''));
        return inlineInto(p, b.text);
      }
      case 'heading': return el('h3', 'dp-h3', b.text);
      case 'list': {
        var ul = el('ul', 'dp-ul');
        (b.items || []).forEach(function(it){ ul.appendChild(inlineInto(el('li'), it)); });
        return ul;
      }
      case 'code': {
        var wrap = el('div', 'dp-codewrap');
        var head = el('div', 'dp-codehead');
        head.appendChild(el('span', 'dp-codetitle', b.title || (b.lang ? b.lang : 'code')));
        var btn = el('button', 'dp-copy', 'Copy'); btn.type = 'button';
        btn.setAttribute('data-code', String(b.code == null ? '' : b.code));
        head.appendChild(btn); wrap.appendChild(head);
        var pre = el('pre'); pre.appendChild(el('code', null, b.code == null ? '' : b.code));
        wrap.appendChild(pre); return wrap;
      }
      case 'callout': {
        var kind = (b.kind === 'warn' || b.kind === 'tip') ? b.kind : 'note';
        var c = el('div', 'dp-callout ' + kind);
        c.appendChild(el('span', 'dp-callout-ic', CALLOUT_IC[kind]));
        var body = el('div', 'dp-callout-body');
        if (b.title) body.appendChild(el('div', 'dp-callout-title', b.title));
        inlineInto(el('p'), b.body) && body.appendChild(inlineInto(el('p'), b.body));
        c.appendChild(body); return c;
      }
      case 'kv-table': case 'kv': {
        var kv = el('div', 'dp-kv');
        (b.rows || []).forEach(function(row){
          var k = Array.isArray(row) ? row[0] : row.k, v = Array.isArray(row) ? row[1] : row.v;
          kv.appendChild(el('div', 'dp-kv-k', k));
          kv.appendChild(inlineInto(el('div', 'dp-kv-v'), v));
        });
        return kv;
      }
      case 'table': {
        var t = el('table', 'dp-table');
        if (b.headers && b.headers.length){
          var thead = el('thead'), htr = el('tr');
          b.headers.forEach(function(h){ htr.appendChild(el('th', null, h)); });
          thead.appendChild(htr); t.appendChild(thead);
        }
        var tb = el('tbody');
        (b.rows || []).forEach(function(r){
          var tr = el('tr');
          (r || []).forEach(function(cell){ tr.appendChild(inlineInto(el('td'), cell)); });
          tb.appendChild(tr);
        });
        t.appendChild(tb); return t;
      }
      case 'steps': case 'workflow': {
        var ol = el('ol', 'dp-steps');
        (b.steps || b.items || []).forEach(function(st){
          var li = el('li', 'dp-step');
          if (st && typeof st === 'object'){
            if (st.title) li.appendChild(el('div', 'dp-step-title', st.title));
            if (st.body != null) inlineInto(el('div', 'dp-step-body'), st.body) && li.appendChild(inlineInto(el('div','dp-step-body'), st.body));
          } else {
            li.appendChild(inlineInto(el('div', 'dp-step-body'), st));
          }
          ol.appendChild(li);
        });
        return ol;
      }
      case 'diagram': {
        var fig = el('figure', 'dp-diagram');
        var pre = el('pre', 'mermaid');
        pre.textContent = String(b.code || b.mermaid || '');   // safe: textContent
        fig.appendChild(pre);
        if (b.caption) fig.appendChild(el('figcaption', null, b.caption));
        return fig;
      }
      case 'image': {
        // Static figure (e.g. an embedded base64 PNG). `width` (px) caps the figure to
        // ~half the image's intrinsic width so it renders crisp on 2× displays; max-width:100%
        // keeps it responsive (both live in .dp-figure in tailwind.css). Caption supports the
        // same inline formatting as prose (so a "[drawn in Figma →](url)" link works).
        var src = safeImgSrc(b.src);
        if (!src) return null;
        var ifig = el('figure', 'dp-figure');
        if (typeof b.width === 'number' && b.width > 0) ifig.style.maxWidth = b.width + 'px';
        var img = el('img'); img.src = src; img.alt = String(b.alt == null ? '' : b.alt);
        // No loading="lazy": inline data URI (nothing to defer) + lazy leaves below-the-fold
        // figures blank in print / screenshots.
        img.decoding = 'async';
        ifig.appendChild(img);
        if (b.caption) ifig.appendChild(inlineInto(el('figcaption', 'dp-figcap'), b.caption));
        return ifig;
      }
      default: return null;
    }
  }

  // ── header ─────────────────────────────────────────────────────────────────
  document.title = DATA.title || 'Documentation';
  document.getElementById('dp-brandtext').textContent = DATA.brand || DATA.title || 'Docs';
  document.getElementById('dp-title').textContent = DATA.title || 'Documentation';
  var lede = document.getElementById('dp-lede');
  if (DATA.subtitle || DATA.lede){ lede.textContent = DATA.subtitle || DATA.lede; } else { lede.hidden = true; }
  if (DATA.kicker){ document.getElementById('dp-eyebrow-text').textContent = DATA.kicker; document.getElementById('dp-eyebrow').hidden = false; }
  if (DATA.version){ var v = document.getElementById('dp-ver'); v.textContent = DATA.version; v.hidden = false; }
  document.getElementById('dp-foot-left').textContent = DATA.footer_left || DATA.title || '';
  document.getElementById('dp-foot-right').textContent = DATA.footer_right || '';

  // ── build sections (assign ids; keep nav order) ───────────────────────────────
  var sections = Array.isArray(DATA.sections) ? DATA.sections.filter(function(s){ return s && s.title; }) : [];
  var usedIds = {};
  sections.forEach(function(s){
    var id = s.id ? slug(s.id) : slug(s.title);
    var base = id, n = 2; while (usedIds[id]){ id = base + '-' + (n++); }
    usedIds[id] = 1; s._id = id;
  });

  var secRoot = document.getElementById('dp-sections');
  sections.forEach(function(s){
    var sec = el('section', 'dp-section'); sec.id = s._id;
    if (s.eyebrow) sec.appendChild(el('div', 'dp-sec-eyebrow', s.eyebrow));
    var h2 = el('h2', 'dp-h2'); h2.appendChild(document.createTextNode(s.title));
    var anchor = el('a', 'dp-anchor', '§'); anchor.href = '#' + s._id; anchor.setAttribute('aria-label','Link to section');
    h2.appendChild(anchor); sec.appendChild(h2);
    if (s.summary) sec.appendChild(inlineInto(el('p', 'dp-summary'), s.summary));
    (s.blocks || []).forEach(function(b){ var node = renderBlock(b); if (node) sec.appendChild(node); });
    // searchable haystack (lower-cased text content of the section)
    s._hay = (s.title + ' ' + (s.eyebrow||'') + ' ' + (s.summary||'') + ' ' + sec.textContent).toLowerCase();
    secRoot.appendChild(sec);
  });

  // ── sidebar nav (grouped, collapsible) ─────────────────────────────────────────
  // Groups come from DATA.nav (explicit [{group, sections:[ids]}]) or auto: one group
  // per section's `group` field, else a single "Contents" group in section order.
  var side = document.getElementById('dp-side');
  var byId = {}; sections.forEach(function(s){ byId[s._id] = s; });
  var groups = [];
  if (Array.isArray(DATA.nav) && DATA.nav.length && DATA.nav[0] && DATA.nav[0].sections){
    var seen = {};
    DATA.nav.forEach(function(g){
      var items = (g.sections || []).map(function(ref){ return byId[slug(ref)] || byId[ref]; }).filter(Boolean);
      items.forEach(function(s){ seen[s._id] = 1; });
      if (items.length) groups.push({ group: g.group || '', sections: items, collapsed: !!g.collapsed });
    });
    var rest = sections.filter(function(s){ return !seen[s._id]; });
    if (rest.length) groups.push({ group: groups.length ? 'More' : '', sections: rest });
  } else {
    var order = [], map = {};
    sections.forEach(function(s){
      var g = s.group || '';
      if (!map[g]){ map[g] = { group: g, sections: [] }; order.push(g); }
      map[g].sections.push(s);
    });
    groups = order.map(function(g){ return map[g]; });
  }

  var navLinkById = {};
  groups.forEach(function(g){
    var grp = el('div', 'dp-navgroup' + (g.collapsed ? ' collapsed' : ''));
    if (g.group){
      var h = el('button', 'dp-navgroup-h'); h.type = 'button';
      var caret = el('span', 'dp-caret', '▼');
      h.appendChild(caret); h.appendChild(document.createTextNode(g.group));
      h.addEventListener('click', function(){ grp.classList.toggle('collapsed'); });
      grp.appendChild(h);
    }
    var ul = el('ul', 'dp-navlist');
    g.sections.forEach(function(s){
      var li = el('li');
      var a = el('a', 'dp-navlink', s.navtitle || s.title); a.href = '#' + s._id;
      a.setAttribute('data-target', s._id);
      navLinkById[s._id] = a;
      li.appendChild(a); ul.appendChild(li);
    });
    grp.appendChild(ul); side.appendChild(grp);
  });

  // ── scrollspy: highlight the nav link of the section nearest the top ───────────
  var order = sections.map(function(s){ return s._id; });
  var active = null;
  function setActive(id){
    if (id === active) return;
    if (active && navLinkById[active]) navLinkById[active].classList.remove('active');
    active = id;
    if (active && navLinkById[active]){
      navLinkById[active].classList.add('active');
      // reveal in a collapsed group
      var grp = navLinkById[active].closest('.dp-navgroup');
      if (grp && grp.classList.contains('collapsed')) grp.classList.remove('collapsed');
    }
  }
  if ('IntersectionObserver' in window){
    var visible = {};
    var io = new IntersectionObserver(function(entries){
      entries.forEach(function(en){ if (en.isIntersecting) visible[en.target.id] = en.intersectionRatio; else delete visible[en.target.id]; });
      // pick the earliest (in document order) currently-visible section
      var pick = null;
      for (var i=0;i<order.length;i++){ if (visible[order[i]] != null){ pick = order[i]; break; } }
      if (pick) setActive(pick);
    }, { rootMargin: '-64px 0px -60% 0px', threshold: [0, 1] });
    document.querySelectorAll('.dp-section').forEach(function(s){ io.observe(s); });
  }
  // Fallback + immediate correctness on click / hashchange
  function syncFromHash(){ var h = (location.hash||'').slice(1); if (h && navLinkById[h]) setActive(h); }
  window.addEventListener('hashchange', syncFromHash);
  if (order.length) setActive(order[0]);
  syncFromHash();

  // Close the mobile drawer after picking a link
  side.addEventListener('click', function(e){ var a = e.target.closest && e.target.closest('.dp-navlink'); if (a){ closeDrawer(); } });

  // ── copy buttons ───────────────────────────────────────────────────────────────
  document.addEventListener('click', function(e){
    var b = e.target.closest && e.target.closest('.dp-copy'); if (!b) return;
    var txt = b.getAttribute('data-code') || '';
    function done(){ b.textContent = 'Copied'; b.classList.add('done'); setTimeout(function(){ b.textContent = 'Copy'; b.classList.remove('done'); }, 1400); }
    if (navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(txt).then(done, fallback);
    } else fallback();
    function fallback(){
      try { var ta = document.createElement('textarea'); ta.value = txt; ta.style.position='fixed'; ta.style.opacity='0';
        document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); done(); } catch(err){}
    }
  });

  // ── search / filter ──────────────────────────────────────────────────────────
  if (CFG.search !== false && sections.length){
    var sw = document.getElementById('dp-searchwrap'); sw.hidden = false;
    var input = document.getElementById('dp-search');
    var nomatch = document.getElementById('dp-nomatch');
    input.addEventListener('input', function(){
      var q = input.value.trim().toLowerCase();
      var any = false;
      sections.forEach(function(s){
        var sec = document.getElementById(s._id);
        var hit = !q || s._hay.indexOf(q) >= 0;
        sec.classList.toggle('dp-hidden', !hit);
        if (navLinkById[s._id]) navLinkById[s._id].parentNode.style.display = hit ? '' : 'none';
        if (hit) any = true;
      });
      nomatch.classList.toggle('on', !any);
    });
  }

  // ── theme toggle ─────────────────────────────────────────────────────────────
  if (CFG.themeToggle){
    var tbtn = document.getElementById('dp-theme'); tbtn.hidden = false;
    tbtn.addEventListener('click', function(){
      var cur = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
      var next = cur === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      try { localStorage.setItem(CFG.lsKey || 'dp-theme', next); } catch(e){}
      mmReRenderAll();
    });
  }

  // ── mobile nav drawer ──────────────────────────────────────────────────────────
  var backdrop = document.getElementById('dp-backdrop');
  function openDrawer(){ side.classList.add('open'); backdrop.classList.add('open'); }
  function closeDrawer(){ side.classList.remove('open'); backdrop.classList.remove('open'); }
  document.getElementById('dp-menu').addEventListener('click', function(){ side.classList.contains('open') ? closeDrawer() : openDrawer(); });
  backdrop.addEventListener('click', closeDrawer);
  document.addEventListener('keydown', function(e){ if (e.key === 'Escape') closeDrawer(); });

  // ── Mermaid (no-op if the lib was not inlined, i.e. no diagram blocks) ──────────
  function mmTheme(){ return document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'default'; }
  window.mmRenderAll = function mmRenderAll(){
    if (typeof window.mermaid === 'undefined') return;
    try { window.mermaid.initialize({ startOnLoad:false, securityLevel:'strict', theme:mmTheme(),
      fontFamily:"'Inter Tight',system-ui,sans-serif" }); } catch(e){}
    var pend = [];
    document.querySelectorAll('.mermaid').forEach(function(n){
      if (!n.hasAttribute('data-src')) n.setAttribute('data-src', n.textContent.trim());
      if (n.getAttribute('data-rendered') === '1') return;
      n.removeAttribute('data-processed'); n.textContent = n.getAttribute('data-src'); pend.push(n);
    });
    if (pend.length){ try { window.mermaid.run({ nodes: pend }).then(function(){
      pend.forEach(function(n){ n.setAttribute('data-rendered','1'); }); }).catch(function(){}); } catch(e){} }
  };
  window.mmReRenderAll = function mmReRenderAll(){
    if (typeof window.mermaid === 'undefined') return;
    document.querySelectorAll('.mermaid[data-rendered="1"]').forEach(function(n){
      n.removeAttribute('data-rendered'); n.removeAttribute('data-processed');
      n.textContent = n.getAttribute('data-src') || n.textContent; });
    window.mmRenderAll();
  };
  // Render after the mermaid lib script (which is placed AFTER this one) has executed.
  if (document.querySelector('.mermaid')){
    setTimeout(function(){ window.mmRenderAll(); }, 0);
  }
})();
</script>
%%MERMAID%%
</body></html>
