<!DOCTYPE html>
<html lang="en" data-theme="%%THEME%%"><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<!-- Self-contained tutorial / field-course generated by the `project-sites` skill (tutorial type).
     The section content is server-rendered by build.mjs with every author string HTML-escaped,
     then inlined below. CSS is inlined (offline / CSP-safe); Mermaid (if any diagram block
     exists) is inlined too — no CDN. The only external resource is the optional Google Fonts link. -->
%%CSP%%
<title>%%TITLE%%</title>
<!-- restore/resolve theme before paint (no flash); honors project theme when the toggle is off -->
<script id="tut-boot" type="application/json">%%CONFIG%%</script>
<script>(function(){try{var c=JSON.parse(document.getElementById('tut-boot').textContent||'{}');
  var mq=window.matchMedia&&matchMedia('(prefers-color-scheme: dark)').matches;var t;
  if(c.themeToggle){t=localStorage.getItem(c.lsKey||'tutorial-theme')||c.theme||(mq?'dark':'light');}
  else{t=(c.theme==='auto')?(mq?'dark':'light'):(c.theme||'light');}
  document.documentElement.setAttribute('data-theme',(t==='dark')?'dark':'light');}catch(e){}})();</script>
%%FONTS%%
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#128218;</text></svg>">
%%STYLEHEAD%%
</head><body class="tut">
<div class="progress" id="progress"></div>
<div class="topbar"><div class="wrap">%%BRAND%%<div class="tbtns"><button class="tbtn" id="themeBtn" hidden>theme</button></div></div></div>
<div class="wrap">
%%BODY%%
</div>
%%MERMAID%%
<script>
(function(){
  var CFG={}; try{ CFG=JSON.parse(document.getElementById('tut-boot').textContent||'{}'); }catch(e){}

  // ── Mermaid runtime (no-op if the lib was not inlined, i.e. no diagram blocks) ──────────
  function mmTheme(){return document.documentElement.getAttribute('data-theme')==='dark'?'dark':'default';}
  function mmRenderVisible(){
    if(typeof window.mermaid==='undefined')return;
    try{window.mermaid.initialize({startOnLoad:false,securityLevel:'strict',theme:mmTheme(),
      fontFamily:"'Inter Tight',system-ui,sans-serif"});}catch(e){}
    var pend=[];
    document.querySelectorAll('.mermaid').forEach(function(n){
      var view=n.closest('.view'); if(view&&view.hidden)return;        // skip hidden sections
      if(!n.hasAttribute('data-src'))n.setAttribute('data-src',n.textContent.trim());
      if(n.getAttribute('data-rendered')==='1')return;
      n.removeAttribute('data-processed'); n.innerHTML=n.getAttribute('data-src'); pend.push(n);
    });
    if(pend.length){try{window.mermaid.run({nodes:pend}).then(function(){
      pend.forEach(function(n){n.setAttribute('data-rendered','1');});}).catch(function(){});}catch(e){}}
  }
  function mmReRenderAll(){ // theme flipped: reset every rendered diagram to source, re-render visible
    if(typeof window.mermaid==='undefined')return;
    document.querySelectorAll('.mermaid[data-rendered="1"]').forEach(function(n){
      n.removeAttribute('data-rendered'); n.removeAttribute('data-processed');
      n.innerHTML=n.getAttribute('data-src')||n.textContent;});
    mmRenderVisible();
  }

  function setTheme(t){document.documentElement.setAttribute('data-theme',t);
    try{if(CFG.themeToggle)localStorage.setItem(CFG.lsKey||'tutorial-theme',t);}catch(e){}
    var b=document.getElementById('themeBtn'); if(b) b.textContent=(t==='dark'?'☀ light':'☾ dark');}
  if(CFG.themeToggle){
    var _tb=document.getElementById('themeBtn'); if(_tb){ _tb.hidden=false; _tb.onclick=function(){
      setTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark'); mmReRenderAll();}; }
  }
  setTheme(document.documentElement.getAttribute('data-theme')||'light');

  function route(){var h=(location.hash||'#home').slice(1)||'home';var found=false;
    document.querySelectorAll('.view').forEach(function(v){var on=(v.id==='view-'+h);v.hidden=!on;if(on)found=true;});
    if(!found){var hv=document.getElementById('view-home'); if(hv) hv.hidden=false;}
    document.querySelectorAll('.card').forEach(function(c){c.style.borderColor=(c.getAttribute('href')==='#'+h)?'var(--lp-accent)':'';});
    window.scrollTo(0,0); mmRenderVisible();}
  window.addEventListener('hashchange',route);route();

  window.addEventListener('scroll',function(){
    var el=document.getElementById('progress'); if(!el)return;
    var h=document.documentElement, max=h.scrollHeight-h.clientHeight;
    el.style.width=(max>0?(h.scrollTop/max*100):0)+'%';});

  document.addEventListener('click',function(e){var t=e.target.closest && e.target.closest('.jtab');if(!t)return;
    var wrap=t.closest('.tabwrap'),name=t.getAttribute('data-tab');
    wrap.querySelectorAll('.jtab').forEach(function(b){b.classList.toggle('on',b===t);});
    wrap.querySelectorAll('.jpanel').forEach(function(pl){pl.classList.toggle('hidden',pl.getAttribute('data-panel')!==name);});});
})();
</script>
</body></html>
