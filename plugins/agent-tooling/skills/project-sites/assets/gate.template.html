<!DOCTYPE html>
<html lang="en" data-theme="light"><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta name="robots" content="noindex, nofollow"/>
<meta name="referrer" content="no-referrer"/>
<!-- Strict CSP enforceable from a static file. connect-src 'none' is the important one:
     even if the decrypted content tried to phone home, the page cannot open any network
     connection — the plaintext stays in the browser. 'unsafe-inline' is required because
     the gate's script + the inlined stylesheet have no external origin to allow. -->
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'none'; base-uri 'none'; form-action 'none'"/>
<title>%%TITLE%% — locked</title>
<!-- restore the reader's theme choice before paint (avoids a flash) -->
<script>(function(){try{var t=localStorage.getItem('lp-theme')||(matchMedia&&matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>%%STYLESHEET%%</style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 bg-app bg-glow text-app font-sans antialiased">
  <main class="w-full max-w-md bg-panel border rounded-2xl shadow-lp px-8 py-10 text-center">
    <div class="text-2xl mb-3" aria-hidden="true">&#128274;</div>
    <div class="font-mono text-\[10px\] uppercase tracking-widest text-accent mb-3">%%KICKER%%</div>
    <h1 class="text-2xl font-bold tracking-tight mb-2">%%TITLE%%</h1>
    <p class="text-sm text-muted leading-relaxed mb-6">%%HINT%%</p>
    <noscript><p class="text-sm text-danger">This page needs JavaScript and the Web Crypto API to decrypt. Please enable JavaScript.</p></noscript>
    <form id="lp-form" autocomplete="off">
      <input id="lp-pass" class="input mb-3" type="password" placeholder="Passcode" autocomplete="off" autofocus aria-label="Passcode"/>
      <button id="lp-go" class="btn" type="submit">Unlock &rarr;</button>
    </form>
    <div id="lp-err" class="text-danger text-xs font-mono mt-3 min-h-4" role="alert" aria-live="polite"></div>
    <div class="font-mono text-\[10px\] text-faint mt-5" aria-hidden="true">&#9646; AES-256-GCM &middot; PBKDF2-SHA256</div>
  </main>

  <script id="lp-payload" type="application/json">%%PAYLOAD%%</script>
  <script>
  (function () {
    'use strict';
    // Clickjacking guard: a static file cannot send X-Frame-Options, but it can refuse
    // to run inside a frame. If we're framed, break out (or blank the page).
    if (window.top !== window.self) {
      try { window.top.location = window.self.location; } catch (e) { document.documentElement.innerHTML = ''; }
      return;
    }
    var payloadEl = document.getElementById('lp-payload');
    var form = document.getElementById('lp-form');
    var input = document.getElementById('lp-pass');
    var btn = document.getElementById('lp-go');
    var errEl = document.getElementById('lp-err');

    // Web Crypto needs a secure context (https or localhost). Say so plainly rather
    // than failing with a cryptic error the reader can't act on.
    if (!window.isSecureContext || !window.crypto || !crypto.subtle) {
      errEl.textContent = 'Serve this over HTTPS (or localhost) — decryption needs a secure context.';
      btn.disabled = true; input.disabled = true; return;
    }

    var P;
    try { P = JSON.parse(payloadEl.textContent); } catch (e) {
      errEl.textContent = 'This page is corrupt (payload could not be parsed).'; btn.disabled = true; return;
    }

    function b64ToBytes(s) {
      var bin = atob(s), out = new Uint8Array(bin.length);
      for (var i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
      return out;
    }

    async function decrypt(passcode) {
      var baseKey = await crypto.subtle.importKey(
        'raw', new TextEncoder().encode(passcode.normalize('NFKC')), { name: 'PBKDF2' }, false, ['deriveKey']
      );
      var key = await crypto.subtle.deriveKey(
        { name: 'PBKDF2', salt: b64ToBytes(P.salt), iterations: P.iter, hash: 'SHA-256' },
        baseKey, { name: 'AES-GCM', length: 256 }, false, ['decrypt']
      );
      // ct carries the 16-byte GCM auth tag APPENDED — Web Crypto verifies it and throws
      // on any mismatch, so a wrong passcode fails here (no partial/garbage plaintext).
      var buf = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: b64ToBytes(P.iv) }, key, b64ToBytes(P.ct));
      return new TextDecoder().decode(buf);
    }

    // The passcode is never persisted (no storage) — re-entry after reload is intentional.
    async function unlock(passcode) {
      if (!passcode) return;
      btn.disabled = true; errEl.textContent = 'Decrypting…';
      try {
        var html = await decrypt(passcode);
        document.open(); document.write(html); document.close();
      } catch (e) {
        btn.disabled = false; errEl.textContent = 'Incorrect passcode.'; input.value = ''; input.focus();
      }
    }
    form.addEventListener('submit', function (e) { e.preventDefault(); unlock(input.value.trim()); });
  })();
  </script>
</body></html>
